# nginx.conf
#
# Padrao [6] — Comunicacao Segura: TLS + Headers no nivel do proxy
#
# Configuracao para servidor de producao (Ubuntu + Let's Encrypt).
# Substitui DOMINIO.COM pelo dominio real do projeto.
#
# Instalar:
#   sudo cp nginx.conf /etc/nginx/sites-available/app
#   sudo ln -s /etc/nginx/sites-available/app /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ─── Redirect HTTP → HTTPS ────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name DOMINIO.COM www.DOMINIO.COM;

    # Redirecionar todo trafego HTTP para HTTPS (permanente)
    return 301 https://$host$request_uri;
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name DOMINIO.COM www.DOMINIO.COM;

    # ── Certificado Let's Encrypt ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMINIO.COM/privkey.pem;

    # ── Versoes TLS — apenas 1.2 e 1.3 ──────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;

    # ── Cipher suites seguros (Mozilla Intermediate) ─────────────────────
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Session cache ─────────────────────────────────────────────────────
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # ── OCSP Stapling ─────────────────────────────────────────────────────
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/DOMINIO.COM/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Headers de seguranca ──────────────────────────────────────────────
    # HSTS — forca HTTPS por 2 anos para este dominio e subdominios
    # Adicionar 'preload' apos confirmar que todos os subdominios suportam HTTPS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Impede MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Impede clickjacking
    add_header X-Frame-Options "DENY" always;

    # Controla referrer em requests cross-origin
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Desabilita recursos de dispositivo nao usados
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;

    # Desabilita filtro XSS legado (pode criar vulnerabilidades em browsers modernos)
    add_header X-XSS-Protection "0" always;

    # ── Remover headers que revelam a stack ───────────────────────────────
    server_tokens off; # remove versao do Nginx
    more_clear_headers Server;
    more_clear_headers X-Powered-By;

    # ── Gzip para performance ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ── Proxy para o backend (Fastify) ────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout para operacoes longas (geracao de PDF, SEFAZ)
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Frontend (build estatico Vite) ────────────────────────────────────
    root /var/www/DOMINIO.COM/dist;
    index index.html;

    # SPA — todas as rotas servem o index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Cache para assets estaticos com hash no nome (gerados pelo Vite)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Bloquear acesso a arquivos sensiveis ──────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|log|sql|bak|config)$ {
        deny all;
        return 404;
    }
}
